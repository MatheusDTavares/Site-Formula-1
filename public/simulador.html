    <!-- simulador inicio -->
    <div class="simulador">
        <div class="container">
            <div class="">
        <div class="">
            <h2>Escolha seu corredor favorito</h2>
            <select name="" id="ipt_aposta">
              <option value="0">🇹🇭 - Alexander Albon </option>
              <option value="1">🇹🇭 - Kimi Antonelli </option>
              <option value="2">🇹🇭 - Carlos Sainz  </option>
              <option value="3">🇹🇭 - Charles Leclerc </option>
              <option value="4">🇹🇭 - Esteban Ocon </option>
              <option value="5">🇹🇭 - Fernando Alonso </option>
              <option value="6">🇹🇭 - Gabriel Bortoleto </option>
              <option value="7">🇹🇭 - George Russell </option>
              <option value="8">🇹🇭 - Isack Hadjar </option>
              <option value="9">🇹🇭 - Kevin Magnussen </option>
              <option value="10">🇹🇭 - Lance Stroll </option>
              <option value="11">🇹🇭 - Lando Norris </option>
              <option value="12">🇹🇭 - Lewis Hamilton </option>
              <option value="13">🇹🇭 - Liam Lawson </option>
              <option value="14">🇹🇭 - Logan Sargeant </option>
              <option value="15">🇹🇭 - Max Verstappen </option>
              <option value="16">🇹🇭 - Nico Hülkenberg </option>
              <option value="17">🇹🇭 - Oscar Piastri  </option>
              <option value="18">🇹🇭 - Pierre Gasly </option>
              <option value="19">🇹🇭 - Sergio Pérez  </option>
              <option value="20">🇫🇮 - Valtteri Bottas </option>
              <option value="21">🇨🇳 - Zhou Guanyu </option>
            </select><br>
            <button onclick="Correr()">Verificar</button><br>

            <h2>Corrida</h2><br><br>
            <div id="resultado" class="simulador"></div>

        </div>
    </div>

        </div>
    </div>

    <!--footer inicio-->

        <div class="container">

            <span class="version">v1.0.0</span>
        </div>
    </div>
    <!--footer fim-->


</body>
<script>
let corredores = [
"Alexander Albon","Kimi Antonelli","Carlos Sainz","Charles Leclerc",
"Esteban Ocon","Fernando Alonso","Gabriel Bortoleto","George Russell",
"Isack Hadjar","Kevin Magnussen","Lance Stroll","Lando Norris",
"Lewis Hamilton","Liam Lawson","Logan Sargeant","Max Verstappen",
"Nico Hülkenberg","Oscar Piastri","Pierre Gasly","Sergio Pérez",
"Valtteri Bottas","Zhou Guanyu"
];

let pesos = [
2,2,4,6,3,5,2,6,2,2,2,7,6,2,1,9,3,7,4,5,3,2
];

let posicoes = [];


function iniciarCorrida() {
    posicoes = [...corredores];
}


function atualizarVolta() {
    posicoes.sort((a, b) => {
        let pesoA = pesos[corredores.indexOf(a)];
        let pesoB = pesos[corredores.indexOf(b)];

        return (Math.random() * pesoB) - (Math.random() * pesoA);
    });
}


function Correr() {
    let resultado = document.getElementById("resultado");
    resultado.innerHTML = "";

    let escolha = Number(ipt_aposta.value);

    iniciarCorrida();

    let volta = 1;
    let totalVoltas = 10;

    let intervalo = setInterval(() => {

        atualizarVolta();

        resultado.innerHTML = `<b> Volta ${volta}/${totalVoltas}</b><br><br>`;

        for (let i = 0; i < 5; i++) {
            resultado.innerHTML += `${i+1}º - ${posicoes[i]} <br>`;
        }

        volta++;

        if (volta > totalVoltas) {
            clearInterval(intervalo);

            resultado.innerHTML += "<br><b> Corrida finalizada!</b><br><br>";

            if (posicoes[0] === corredores[escolha]) {
                resultado.innerHTML += " Você acertou o vencedor!";
            } else {
                resultado.innerHTML += ` Você escolheu ${corredores[escolha]}`;
            }
        }

    }, 1000); 
}
</script>
</html>
